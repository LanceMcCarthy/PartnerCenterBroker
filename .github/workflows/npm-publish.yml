name: Publish Packages

on:
  workflow_dispatch:

permissions:
  id-token: write # for npm OIDC
  contents: write # for github releases

jobs:
  publish-npm:
    name: Publish to npmjs.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/

      - name: Generate version number with date and workflow Run Number
        id: version-creator
        run: |
          buildDay=`date +%Y.%m%d`
          tags="$buildDay.$GITHUB_RUN_NUMBER"
          echo "version_number=$tags" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: npm version --no-git-tag-version "${{steps.version-creator.outputs.version_number}}"

      - name: Configure Git identity for CI commits
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prep and Publish
        run: npm run publish-gh-actions
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

      - uses: actions/upload-artifact@v6
        with:
          name: "lancemccarthy-partner-center-broker-${{steps.version-creator.outputs.version_number}}.tgz"
          path: "lancemccarthy-partner-center-broker-${{steps.version-creator.outputs.version_number}}.tgz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "lancemccarthy-partner-center-broker-${{steps.version-creator.outputs.version_number}}.tgz"
